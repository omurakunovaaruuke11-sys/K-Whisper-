<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Up • Прокачай себя</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7b5eff;
            --primary-dark: #5f3fff;
            --bg: #0f0b1f;
            --card: #1a1633;
            --text: #e0d9ff;
            --text-light: #b8b0e0;
            --success: #4ade80;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0b1f 0%, #1a1433 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        header {
            text-align: center;
            padding: 2.5rem 1rem 2rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(90deg, #c4b5ff, #7b5eff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-light);
            font-size: 1.1rem;
            margin-top: 0.5rem;
        }

        main {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem;
            display: grid;
            gap: 1.5rem;
        }

        section {
            background: var(--card);
            border-radius: 20px;
            padding: 1.8rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(123, 94, 255, 0.1);
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 1.2rem;
            color: #c4b5ff;
        }

        /* Цели */
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        #goal-input {
            flex: 1;
            padding: 14px 18px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 1rem;
        }

        #goal-input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(123, 94, 255, 0.3);
        }

        button {
            padding: 14px 24px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        #goal-list {
            list-style: none;
            padding: 0;
        }

        .goal-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            margin-bottom: 10px;
            transition: all 0.3s;
        }

        .goal-item.completed {
            opacity: 0.7;
            text-decoration: line-through;
        }

        .goal-item input[type="checkbox"] {
            width: 22px;
            height: 22px;
            accent-color: var(--success);
            cursor: pointer;
        }

        .goal-text {
            flex: 1;
            font-size: 1.05rem;
        }

        .delete-btn {
            background: transparent;
            color: #ff6b6b;
            font-size: 1.4rem;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .delete-btn:hover {
            background: rgba(255, 107, 107, 0.2);
        }

        /* Прогресс */
        #stats-info {
            font-size: 1.1rem;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .progress-bar {
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 999px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #7b5eff, #a78bff);
            width: 0%;
            transition: width 0.6s ease;
        }

        /* Челлендж */
        #challenge-text {
            font-size: 1.25rem;
            padding: 1.2rem;
            background: rgba(123, 94, 255, 0.1);
            border-radius: 16px;
            margin-bottom: 1rem;
            min-height: 80px;
            display: flex;
            align-items: center;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2.4rem; }
            main { padding: 1rem 0.8rem; }
            section { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <header>
        <h1>Glow Up</h1>
        <p>Прокачай себя: здоровье, обучение, стиль жизни</p>
    </header>

    <main>
        <!-- Цели на сегодня -->
        <section id="goals">
            <h2>Цели на сегодня</h2>
            <div class="input-group">
                <input type="text" id="goal-input" placeholder="Добавь новую цель..." autocomplete="off">
                <button id="add-btn">Добавить</button>
            </div>
            <ul id="goal-list"></ul>
        </section>

        <!-- Прогресс -->
        <section id="stats">
            <h2>Прогресс</h2>
            <p id="stats-info">0 выполнено из 0</p>
            <div class="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </section>

        <!-- Челлендж дня -->
        <section id="challenges">
            <h2>Челлендж дня 💪</h2>
            <p id="challenge-text">Выполни 5 минут растяжки!</p>
            <button id="new-challenge-btn">Новый челлендж</button>
        </section>
    </main>

    <script>
        let goals = [];

        const challenges = [
            "Выполни 5 минут растяжки!",
            "Выучи 5 новых слов на английском!",
            "Пей воду в течение часа!",
            "Напиши 3 вещи, за которые благодарен сегодня!",
            "Сделай 10 приседаний!",
            "Сделай 20-минутную прогулку",
            "Практикуй медитацию 10 минут",
            "Избегай сладкого сегодня",
            "Сделай уборку в комнате",
            "Выучи 10 новых слов"
        ];

        // Загрузка целей
        function loadGoals() {
            const savedGoals = localStorage.getItem('glowUpGoals');
            if (savedGoals) {
                goals = JSON.parse(savedGoals);
            }
        }

        // Сохранение целей
        function saveGoals() {
            localStorage.setItem('glowUpGoals', JSON.stringify(goals));
        }

        function addGoal() {
            const input = document.getElementById("goal-input");
            const text = input.value.trim();
            if (text === "") return;

            goals.push({ 
                id: Date.now(),
                text: text, 
                done: false 
            });

            input.value = "";
            renderGoals();
            saveGoals();
        }

        function toggleDone(id) {
            goals = goals.map(goal => 
                goal.id === id ? { ...goal, done: !goal.done } : goal
            );
            renderGoals();
            saveGoals();
        }

        function deleteGoal(id) {
            if (confirm("Удалить эту цель?")) {
                goals = goals.filter(goal => goal.id !== id);
                renderGoals();
                saveGoals();
            }
        }

        function renderGoals() {
            const list = document.getElementById("goal-list");
            list.innerHTML = "";

            if (goals.length === 0) {
                list.innerHTML = `<li style="opacity:0.6; text-align:center; padding:25px;">Добавь первую цель на сегодня ✨</li>`;
                updateProgress();
                return;
            }

            goals.forEach(goal => {
                const item = document.createElement("li");
                item.className = `goal-item ${goal.done ? 'completed' : ''}`;
                item.innerHTML = `
                    <input type="checkbox" ${goal.done ? 'checked' : ''}>
                    <span class="goal-text">${goal.text}</span>
                    <button class="delete-btn" title="Удалить">×</button>
                `;

                item.querySelector('input').addEventListener('change', () => toggleDone(goal.id));
                item.querySelector('.delete-btn').addEventListener('click', (e) => {
                    e.stopPropagation();
                    deleteGoal(goal.id);
                });

                list.appendChild(item);
            });

            updateProgress();
        }

        function updateProgress() {
            const doneCount = goals.filter(g => g.done).length;
            const total = goals.length;

            document.getElementById("stats-info").textContent = 
                `${doneCount} выполнено из ${total}`;

            const percent = total === 0 ? 0 : (doneCount / total) * 100;
            document.getElementById("progress-fill").style.width = percent + "%";
        }

        function newChallenge() {
            const idx = Math.floor(Math.random() * challenges.length);
            document.getElementById("challenge-text").innerText = challenges[idx];
        }

        // Инициализация
        function init() {
            document.getElementById("add-btn").addEventListener("click", addGoal);
            
            document.getElementById("goal-input").addEventListener("keypress", (e) => {
                if (e.key === "Enter") addGoal();
            });

            document.getElementById("new-challenge-btn").addEventListener("click", newChallenge);

            loadGoals();
            renderGoals();
            newChallenge();
        }

        window.onload = init;
    </script>
</body>
</html>
